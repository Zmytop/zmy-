<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>点击圆球 · 四图环绕 · 透明蓝球+星光环绕+流星悬停</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      overflow: hidden;
      position: relative;
    }

    .canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ----- 圆球样式：半透明玻璃质感 + 鼠标悬停发光 + 上下浮动 + 流星效果 ----- */
   .sphere {
      position: absolute;
      left: 70px;
      top: calc(100vh - 170px); 
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 
        0 20px 30px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -1px 0 rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: left 0.6s cubic-bezier(0.34, 1.3, 0.7, 1), 
                  top 0.6s cubic-bezier(0.34, 1.3, 0.7, 1), 
                  transform 0.6s cubic-bezier(0.34, 1.3, 0.7, 1),
                  background 0.8s ease, 
                  box-shadow 0.3s ease;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      user-select: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      overflow: hidden;
    }
    .sphere::before {
    content: '';
    position: absolute;
    top: var(--y);
    left: var(--x);
    transform: translate(-50%, -50%);
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, 
        rgba(255, 220, 100, 0.9) 0%, 
        rgba(255, 200, 80, 0.6) 20%,
        rgba(255, 180, 60, 0.3) 40%,
        transparent 70%);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    z-index: -1;
    filter: blur(2px);
    /* 流光动画 */
    animation: flowGlow 0.6s ease-out forwards;
}

/* 悬停时触发流光 */
.sphere:hover::before {
    opacity: 1;
}

/* 流光扩散动画 */
@keyframes flowGlow {
    0% {
        transform: translate(-50%, -50%) scale(0.3);
        opacity: 0;
    }
    30% {
        opacity: 0.8;
    }
    100% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
    }
}

    
    /* 流星效果：悬浮时出现划过周围的流星 */
    .sphere:hover {
      box-shadow: 
        0 0 30px rgba(255, 255, 255, 0.8),
        0 0 50px rgba(255, 255, 255, 0.5),
        0 20px 30px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -1px 0 rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.35);
      animation: floatHover 1.4s ease-in-out infinite;
    }
    
    /* 流星粒子容器 */
    .sphere .meteor-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 5;
    }
    
    /* 流星样式 */
    .sphere .meteor {
      position: absolute;
      width: 3px;
      height: 3px;
      background: radial-gradient(circle, rgba(255, 255, 200, 1) 0%, rgba(255, 200, 100, 0.8) 50%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255, 220, 100, 0.9), 0 0 12px rgba(255, 200, 80, 0.6);
      opacity: 0;
      filter: blur(0.5px);
    }
    
    /* 流星轨迹光痕 */
    .sphere .meteor::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255, 220, 100, 0.8), transparent);
      transform: translate(-50%, -50%) translateX(-10px);
      border-radius: 2px;
      filter: blur(1px);
    }
    
    /* 不同方向的流星动画 */
    @keyframes meteor1 {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.5);
      }
      10% {
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translate(-80px, -80px) scale(1.2);
      }
    }
    
    @keyframes meteor2 {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.5);
      }
      10% {
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translate(80px, -70px) scale(1.2);
      }
    }
    
    @keyframes meteor3 {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.5);
      }
      10% {
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translate(-70px, 80px) scale(1.2);
      }
    }
    
    @keyframes meteor4 {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.5);
      }
      10% {
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translate(75px, 75px) scale(1.2);
      }
    }
    
    @keyframes meteor5 {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.5);
      }
      10% {
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translate(-90px, 30px) scale(1.2);
      }
    }
    
    @keyframes meteor6 {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.5);
      }
      10% {
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translate(60px, -85px) scale(1.2);
      }
    }
    
    /* 悬浮时启动流星动画 */
    .sphere:hover .meteor-1 {
      animation: meteor1 1.2s ease-out infinite;
    }
    .sphere:hover .meteor-2 {
      animation: meteor2 1.4s ease-out infinite 0.2s;
    }
    .sphere:hover .meteor-3 {
      animation: meteor3 1.1s ease-out infinite 0.4s;
    }
    .sphere:hover .meteor-4 {
      animation: meteor4 1.3s ease-out infinite 0.6s;
    }
    .sphere:hover .meteor-5 {
      animation: meteor5 1.5s ease-out infinite 0.3s;
    }
    .sphere:hover .meteor-6 {
      animation: meteor6 1.0s ease-out infinite 0.5s;
    }
    
    /* 上下浮动动画 */
    @keyframes floatHover {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
      100% {
        transform: translateY(0px);
      }
    }
    
    /* active状态：蓝色小球改为透明玻璃，悬停时发出淡蓝色光 */
    .sphere.active {
      left: 220px;
      top: calc(100vh - 460px);
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 
        0 20px 30px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -1px 0 rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(100, 180, 255, 0.4);
    }
    .sphere.active::before {
    background: radial-gradient(circle, rgba(100, 180, 255, 0.9) 0%, rgba(80, 160, 255, 0.5) 30%, transparent 70%);
}
.sphere.active:hover::before {
    opacity: 1;
}
    
    /* active状态下悬浮时隐藏流星（保持干净） */
    .sphere.active:hover .meteor {
      animation: none !important;
      opacity: 0 !important;
    }
    
    /* active状态悬停：淡蓝色光 + 上下浮动 */
    .sphere.active:hover {
      box-shadow: 
        0 0 35px rgba(100, 180, 255, 0.8),
        0 0 55px rgba(80, 160, 255, 0.5),
        0 20px 30px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -1px 0 rgba(0, 0, 0, 0.1);
      background: rgba(180, 220, 255, 0.25);
      animation: floatHoverActive 1.4s ease-in-out infinite;
      border: 1px solid rgba(100, 200, 255, 0.6);
    }
    
    @keyframes floatHoverActive {
      0% {
        transform: translateY(0px) scale(1.05);
      }
      50% {
        transform: translateY(-8px) scale(1.05);
      }
      100% {
        transform: translateY(0px) scale(1.05);
      }
    }

    /* ----- 星星粒子环绕系统（仅蓝色小球激活时显示）----- */
    .star-container {
      position: fixed;
      pointer-events: none;
      z-index: 15;
      transition: all 0.6s cubic-bezier(0.34, 1.3, 0.7, 1);
    }
    
    .star-particle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, rgba(200, 220, 255, 0.9) 0%, rgba(100, 180, 255, 0.4) 60%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(150, 200, 255, 0.8), 0 0 20px rgba(100, 150, 255, 0.5);
      filter: blur(0.5px);
      animation: starGlow 1.5s ease-in-out infinite alternate;
    }
    
    @keyframes starGlow {
      0% {
        opacity: 0.6;
        box-shadow: 0 0 8px rgba(150, 200, 255, 0.6), 0 0 14px rgba(100, 150, 255, 0.3);
        transform: scale(0.9);
      }
      100% {
        opacity: 1;
        box-shadow: 0 0 18px rgba(180, 220, 255, 1), 0 0 28px rgba(120, 180, 255, 0.7);
        transform: scale(1.2);
      }
    }
    
    .star-particle.small { width: 6px; height: 6px; }
    .star-particle.medium { width: 10px; height: 10px; }
    .star-particle.large { width: 14px; height: 14px; }
    
    /* ----- 环绕图片容器 ----- */
    .orbit-container {
      position: absolute;
      top: calc(100vh - 70px);
      left: 170px;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 20;
      transition: top 0.6s cubic-bezier(0.34, 1.3, 0.7, 1), left 0.6s cubic-bezier(0.34, 1.3, 0.7, 1);
    }

    .sphere.active ~ .orbit-container {
      top: calc(100vh - 360px);
      left: 300px;
      pointer-events: auto;
    }

    .orbit-item {
      position: absolute;
      width: 70px;
      height: 70px;
      top: 50%;
      left: 50%;
      margin-top: -35px;
      margin-left: -35px;
      pointer-events: auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .orbit-item:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateX(110px) rotate(0deg); }
    .orbit-item:nth-child(2) { transform: translate(-50%, -50%) rotate(90deg) translateX(110px) rotate(-90deg); }
    .orbit-item:nth-child(3) { transform: translate(-50%, -50%) rotate(180deg) translateX(110px) rotate(-180deg); }
    .orbit-item:nth-child(4) { transform: translate(-50%, -50%) rotate(270deg) translateX(110px) rotate(-270deg); }

    .orbit-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,215,0,0.7);
      background: #222;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }

    .orbit-image:hover {
      transform: scale(1.12);
      box-shadow: 0 0 25px 8px rgba(255, 255, 255, 0.9), 0 0 15px 4px rgba(255, 255, 200, 0.8), 0 8px 20px rgba(0,0,0,0.5), 0 0 0 4px rgba(255, 255, 255, 0.9);
      filter: brightness(1.1);
    }

    .sphere.active ~ .orbit-container .orbit-item {
      opacity: 1;
      visibility: visible;
      animation: none;
    }

    .hint {
      position: absolute;
      bottom: 30px;
      left: 30px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 6px 18px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      pointer-events: none;
      z-index: 5;
      letter-spacing: 0.5px;
    }
   .button-container div {
    padding: 20px 60px;
    background-color: rgba(45,45,45,1);
    border-radius: 50px;
    color: #999;
    font-size: 1.5em;
    text-align: center;
    cursor: pointer;
    transition: .5s;
    position: relative;
}

.glow-box {
    overflow: hidden;
    position: relative;
}

.glow-box span {
    position: relative;
    z-index: 1;
}

/* 光晕效果 - 只在鼠标周围一个小圆内发光 */
.glow-box::before {
    content: '';
    position: absolute;
    top: var(--y);
    left: var(--x);
    transform: translate(-50%, -50%);
    width: 20px;           /* 缩小光晕范围 */
    height: 20px;
    background: radial-gradient(circle, var(--clr) 0%, var(--clr) 20%, transparent 70%);
    opacity: 0;
    transition: opacity 0.2s ease;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(2px);     /* 轻微模糊，更柔和 */
}

/* 悬停时显示光晕 */
.glow-box:hover::before {
    opacity: 1;
}

/* 重要：去掉盒子本身的文字变色效果 */
.glow-box:hover {
    color: #999;           /* 保持原色，不变成彩色 */
    text-shadow: none;     /* 去掉文字发光 */
}

/* 可选：鼠标周围更强的高光点 */
.glow-box::after {
    content: '';
    position: absolute;
    top: var(--y);
    left: var(--x);
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    background: radial-gradient(circle, rgb(235, 228, 7) 0%, transparent 70%);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s ease;
    pointer-events: none;
    z-index: 2;
}

.glow-box:hover::after {
    opacity: 0.8;
}
.trail-particle {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    border-radius: 50%;
    filter: blur(2px);
    animation: fadeOut 0.6s ease-out forwards;
}

/* 粒子消失动画 */
@keyframes fadeOut {
    0% {
        opacity: 0.8;
        transform: scale(1);
    }
    100% {
        opacity: 0;
        transform: scale(0.3);
    }
}
  </style>

<script>
    const sphere = document.getElementById('sphere');
    let lastX = 0, lastY = 0;
let trailInterval = null;
let isHovering = false;

// 创建拖尾粒子
function createTrail(x, y, color) {
    const particle = document.createElement('div');
    particle.className = 'trail-particle';
    
    // 随机大小 4-12px
    const size = Math.random() * 8 + 4;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.left = (x - size/2) + 'px';
    particle.style.top = (y - size/2) + 'px';
    
    // 使用传入的颜色或默认金色
    particle.style.background = color || `radial-gradient(circle, rgba(255, 220, 100, 0.9), rgba(255, 160, 50, 0.6))`;
    particle.style.boxShadow = `0 0 8px ${color || 'rgba(255, 200, 80, 0.8)'}`;
    
    document.body.appendChild(particle);
    
    // 动画结束后移除粒子
    setTimeout(() => {
        particle.remove();
    }, 600);
}

// 获取小球当前颜色（根据状态）
function getCurrentTrailColor() {
    if (sphere.classList.contains('active')) {
        // 激活状态：蓝色拖尾
        return `radial-gradient(circle, rgba(100, 180, 255, 0.9), rgba(50, 120, 220, 0.6))`;
    } else {
        // 普通状态：金色拖尾
        return `radial-gradient(circle, rgba(255, 225, 225, 0.9), rgba(220, 220, 255, 0.7))`;
    }
}

// 获取发光颜色（用于阴影）
function getCurrentGlowColor() {
    if (sphere.classList.contains('active')) {
        return 'rgba(100, 180, 255, 0.8)';
    } else {
        return 'rgba(255, 255, 255, 0.9)';
    }
}

// 鼠标移动时产生拖尾
function onMouseMove(e) {
    if (!isHovering) return;
    
    const rect = sphere.getBoundingClientRect();
    const mouseX = e.clientX;
    const mouseY = e.clientY;
    
    // 检查鼠标是否在小球内
    const dx = mouseX - (rect.left + rect.width/2);
    const dy = mouseY - (rect.top + rect.height/2);
    const distance = Math.sqrt(dx*dx + dy*dy);
    
    if (distance <= rect.width/2) {
        // 产生拖尾粒子
        const trailColor = getCurrentTrailColor();
        const glowColor = getCurrentGlowColor();
        createTrail(mouseX, mouseY, trailColor);
        
        // 更新最后位置
        lastX = mouseX;
        lastY = mouseY;
    }
}

// 鼠标进入小球
function onMouseEnter() {
    isHovering = true;
}

// 鼠标离开小球
function onMouseLeave() {
    isHovering = false;
}

// 绑定事件
sphere.addEventListener('mousemove', onMouseMove);
sphere.addEventListener('mouseenter', onMouseEnter);
sphere.addEventListener('mouseleave', onMouseLeave);
    sphere.onmousemove = (e) => {
    let rect = sphere.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;
    sphere.style.setProperty('--x', `${x}px`);
    sphere.style.setProperty('--y', `${y}px`);
};

// 鼠标离开小球时，光晕淡出（可选，CSS 已经处理了）
sphere.onmouseleave = () => {

};

    ];
    
    function createStars() {
      starContainer.innerHTML = '';
      stars = [];

      for (let i = 0; i < starConfigs.length; i++) {
        const config = starConfigs[i];
        const star = document.createElement('div');
        star.className = `star-particle ${config.size}`;
        star.style.position = 'absolute';
        star.style.left = '0px';
        star.style.top = '0px';
        starContainer.appendChild(star);
        stars.push({
          element: star,
          radius: config.radius,
          speed: config.speed,
          orbitSpeed: config.orbitSpeed,
          size: config.size,
          angle: (i / starConfigs.length) * Math.PI * 2
        });
        starAngleOffsets.push((i / starConfigs.length) * Math.PI * 2);
      }
    }
    
    function getBlueBallCenter() {
      const rect = sphere.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }
    
    let starRotationAngle = 0;
    function updateStarsPosition() {
      if (!isActive) return;
      const center = getBlueBallCenter();
      if (!center.x || !center.y) return;
      starRotationAngle += 0.008;
      if (starRotationAngle >= Math.PI * 2) starRotationAngle -= Math.PI * 2;
      for (let i = 0; i < stars.length; i++) {
        const star = stars[i];
        const angle = starRotationAngle * star.orbitSpeed + starAngleOffsets[i];
        const x = center.x + Math.cos(angle) * star.radius - star.element.offsetWidth / 2;
        const y = center.y + Math.sin(angle) * star.radius - star.element.offsetHeight / 2;
        star.element.style.left = x + 'px';
        star.element.style.top = y + 'px';
      }
      starAnimationId = requestAnimationFrame(updateStarsPosition);
    }
    
    function stopStarsAnimation() {
      if (starAnimationId) { cancelAnimationFrame(starAnimationId); starAnimationId = null; }
      if (stars) { stars.forEach(star => { star.element.style.opacity = '0'; }); }
    }
    
    function startStarsAnimation() {
      if (stars.length === 0) createStars();
      stars.forEach(star => { star.element.style.opacity = '1'; });
      starRotationAngle = 0;
      if (starAnimationId) cancelAnimationFrame(starAnimationId);
      starAnimationId = requestAnimationFrame(updateStarsPosition);
    }
    
    function rotateImages() {
      if (!isActive) return;
      rotationAngle += 0.5;
      if (rotationAngle >= 360) rotationAngle -= 360;
      orbitItems.forEach((item, index) => {
        const baseAngle = index * 90;
        const currentAngle = baseAngle + rotationAngle;
        item.style.transform = `translate(-50%, -50%) rotate(${currentAngle}deg) translateX(110px) rotate(-${currentAngle}deg)`;
      });
      animationId = requestAnimationFrame(rotateImages);
    }
    
    function startRotation() {
      if (!isActive) { isActive = true; rotateImages(); startStarsAnimation(); }
    }
    
    function stopRotation() {
      isActive = false;
      if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
      stopStarsAnimation();
    }
    
    function setIframeToFullscreen() {
      if (!parentIframe) return;
      parentIframe.style.width = '100vw';
      parentIframe.style.height = '100vh';
      parentIframe.style.top = '0';
      parentIframe.style.left = '0';
      parentIframe.style.bottom = 'auto';
      parentIframe.style.right = 'auto';
      parentIframe.style.position = 'fixed';
      parentIframe.style.border = 'none';
    }
    
    function setIframeToFloating() {
      if (!parentIframe) return;
      parentIframe.style.width = '210px';
      parentIframe.style.height = '210px';
      parentIframe.style.bottom = '20px';
      parentIframe.style.left = '20px';
      parentIframe.style.top = 'auto';
      parentIframe.style.right = 'auto';
      parentIframe.style.position = 'fixed';
      parentIframe.style.border = 'none';
    }
    
    function handleSphereClick(e) {
      e.stopPropagation();
      if (sphere.classList.contains('active')) {
        sphere.classList.remove('active');
        stopRotation();
        setIframeToFloating();
      } else {
        sphere.classList.add('active');
        startRotation();
        setIframeToFullscreen();
      }
    }
    
    sphere.addEventListener('click', handleSphereClick);
    orbitContainer.addEventListener('click', function(e) { e.stopPropagation(); });
    document.addEventListener('click', function(e) {
      if (!sphere.contains(e.target) && !orbitContainer.contains(e.target)) {
        if (sphere.classList.contains('active')) {
          sphere.classList.remove('active');
          stopRotation();
          setIframeToFloating();
        }
      }
    });
    
    window.addEventListener('resize', function() { if (isActive && starAnimationId) updateStarsPosition(); });
    window.addEventListener('beforeunload', function() { if (animationId) cancelAnimationFrame(animationId); if (starAnimationId) cancelAnimationFrame(starAnimationId); });
    
    createStars();
    stopStarsAnimation();
    
    if (parentIframe) {
      if (!parentIframe.style.width || parentIframe.style.width === '') setIframeToFloating();
    }
  })();
// 选择带有 glow-box 类的 div 元素
let boxes = document.querySelectorAll('.glow-box');

boxes.forEach(box => {
    box.onmousemove = (e) => {
        let rect = box.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;
        box.style.setProperty('--x', `${x}px`);
        box.style.setProperty('--y', `${y}px`);
    }
});
</script>
